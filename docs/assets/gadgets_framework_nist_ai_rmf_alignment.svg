<text class="" x="1126" y="224" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="800" fill="#172033" text-anchor="start"><tspan x="1126" dy="0">MAP</tspan></text>
<text class="" x="1126" y="255" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#5b667a" text-anchor="start"><tspan x="1126" dy="0">Context, capabilities, boundaries, and dependencies</tspan></text>
