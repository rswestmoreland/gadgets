<text class="" x="1108" y="416" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#172033" text-anchor="start"><tspan x="1108" dy="0">Future: data exposure classes and AI</tspan><tspan x="1108" dy="22.419999999999998">system/provider inventory</tspan></text><rect x="80" y="770" width="680" height="300" rx="28" fill="#e9f7ef" stroke="#198754" stroke-width="2.5"/>
