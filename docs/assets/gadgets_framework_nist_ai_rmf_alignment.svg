<rect x="0" y="0" width="1800" height="1200" fill="#f7f9fc"/>
<text class="" x="70" y="76" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="800" fill="#172033" text-anchor="start"><tspan x="70" dy="0">Gadgets Framework Alignment with NIST AI RMF</tspan></text><text class="" x="72" y="115" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="400" fill="#5b667a" text-anchor="start"><tspan x="72" dy="0">NIST AI RMF Core uses four functions: Govern, Map, Measure, and Manage. Gadgets maps runtime controls and evidence to each function.</tspan></text><ellipse cx="900" cy="620" rx="700" ry="430" fill="none" stroke="#a8b3c7" stroke-width="3" stroke-dasharray="13 11" opacity="0.55"/><rect x="80" y="170" width="680" height="300" rx="28" fill="#f0ebff" stroke="#7048e8" stroke-width="2.5"/>
<g fill="none" stroke="#7048e8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M130.0,196 L148,204 V216.0 C147,232 130.0,236 130.0,236 C130.0,236 113,232 112,216.0 V204 Z"/><path d="M130.0,205 V229"/></g>
<text class="" x="166" y="224" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="800" fill="#172033" text-anchor="start"><tspan x="166" dy="0">GOVERN</tspan></text>
<text class="" x="166" y="255" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#5b667a" text-anchor="start"><tspan x="166" dy="0">Policies, roles, accountability, and oversight</tspan></text>
