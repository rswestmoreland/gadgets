<text class="" x="148" y="958" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#172033" text-anchor="start"><tspan x="148" dy="0">Trust diagnostics, signature results,</tspan><tspan x="148" dy="22.419999999999998">redaction outcomes, policy decisions</tspan></text>
<circle cx="128" cy="1009" r="5" fill="#198754"/>
<text class="" x="148" y="1016" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#172033" text-anchor="start"><tspan x="148" dy="0">Future: policy outcome metrics and</tspan><tspan x="148" dy="22.419999999999998">redaction/denial reporting</tspan></text><rect x="1040" y="770" width="680" height="300" rx="28" fill="#fff2df" stroke="#b85c00" stroke-width="2.5"/>
