<text class="" x="166" y="855" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#5b667a" text-anchor="start"><tspan x="166" dy="0">Evidence, testing, telemetry, and control effectiveness</tspan></text>
