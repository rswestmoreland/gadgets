schema_version: gadgets.framework/v0.1
kind: Gadget
metadata:
  name: patch.writer
  version: 0.1.0
  display_name: Patch Writer Gadget
  description: Proposes and, after approval, applies scoped repository patches.
runtime:
  model_profile: mock_default
  execution_mode: change
permission_level: change
capabilities:
  - patch.plan
  - repo.patch.plan
  - file.write
boundaries:
  zones:
    - local_repo
  filesystem:
    roots:
      - "."
    writable: true
    readable_paths:
      - "."
    writable_paths:
      - "src/"
      - "tests/"
      - "docs/"
      - "README.md"
    denied_paths:
      - ".git/"
      - ".gadgets/"
      - ".env"
      - "secrets/"
      - "**/*.pem"
      - "**/*.key"
      - "**/*secret*"
      - "**/*credential*"
tools:
  allowed:
    - patch.plan
    - file.patch
    - file.write
handoffs:
  allowed_targets:
    - test.runner
    - documentation.writer
evidence:
  required:
    - summary
    - diff
    - files_changed
    - assumptions
approval:
  required_for:
    - local_write
