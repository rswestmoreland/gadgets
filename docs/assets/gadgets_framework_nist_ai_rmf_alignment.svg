<text class="" x="1108" y="358" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#172033" text-anchor="start"><tspan x="1108" dy="0">Built-in vs project-local pack source and</tspan><tspan x="1108" dy="22.419999999999998">trust-root context</tspan></text>
