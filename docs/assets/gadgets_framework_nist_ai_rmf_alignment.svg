<text class="" x="148" y="900" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#172033" text-anchor="start"><tspan x="148" dy="0">Evidence bundles, artifact hashes, audit</tspan><tspan x="148" dy="22.419999999999998">verification, allowlisted test output</tspan></text>
