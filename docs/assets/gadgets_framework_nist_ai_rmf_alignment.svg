<text class="" x="148" y="300" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#172033" text-anchor="start"><tspan x="148" dy="0">Separation of duties between provider</tspan><tspan x="148" dy="22.419999999999998">reasoning and runtime execution</tspan></text>
