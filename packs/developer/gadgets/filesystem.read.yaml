schema_version: gadgets.framework/v0.1
kind: Gadget

metadata:
  name: filesystem.read
  version: 0.1.0
  display_name: Filesystem Read Gadget
  description: Reads scoped project files and produces summaries.

runtime:
  model_profile: mock_default
  execution_mode: observe

permission_level: observe

capabilities:
  - repo.read
  - file.read
  - file.search

boundaries:
  zones:
    - local_repo
  filesystem:
    roots:
      - "."
    writable: false
    denied_paths:
      - ".git/"
      - ".gadgets/"
      - ".env"
      - "secrets/"
      - "**/*.pem"
      - "**/*.key"
      - "**/*secret*"
      - "**/*credential*"

tools:
  allowed:
    - file.list
    - file.read
    - file.search

handoffs:
  allowed_targets:
    - documentation.writer
    - patch.writer
    - test.runner

evidence:
  required:
    - summary
    - files_read
    - denied_accesses
    - assumptions

approval:
  required_for: []
