<text class="" x="1108" y="300" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#172033" text-anchor="start"><tspan x="1108" dy="0">Packs, Gadget manifests, capabilities,</tspan><tspan x="1108" dy="22.419999999999998">zones, and provider profiles</tspan></text>
