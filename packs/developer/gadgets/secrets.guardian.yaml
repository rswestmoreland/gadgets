schema_version: gadgets.framework/v0.1
kind: Gadget
metadata:
  name: secrets.guardian
  version: 0.1.0
  display_name: Secrets Guardian Gadget
  description: Detects, blocks, and redacts secret-like files, paths, and values.
runtime:
  model_profile: mock_default
  execution_mode: observe
permission_level: observe
capabilities:
  - secret.scan
  - secret.block
boundaries:
  zones:
    - local_repo
  filesystem:
    roots:
      - "."
    writable: false
    denied_paths:
      - ".env"
      - "secrets/"
      - "**/*.pem"
      - "**/*.key"
      - "**/*secret*"
      - "**/*credential*"
tools:
  allowed:
    - file.search
    - secret.scan
handoffs:
  allowed_targets:
    - policy
evidence:
  required:
    - summary
    - denied_accesses
    - secret_scan_report
    - assumptions
approval:
  required_for: []
