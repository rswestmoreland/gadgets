# Step 37 pack-load trust gate settings. This gate is dry-run only:
# Safe Mode warns, Team and Production record would-deny outcomes, and
# no runtime hard-deny pack-load enforcement is enabled yet.
pack_trust:
  enabled: true
  enforcement:
    safe: warn-only
    team: dry-run-deny
    production: dry-run-deny
  safe_mode:
    allow_unsigned_local_packs: true
  evidence:
    require_for_pack_load_decisions: true
  audit:
    require_for_pack_load_decisions: true

zones:
  local_repo:
    type: local_repo
    root: "."
    readable_paths:
      - "."
    writable_paths: []
    denied_paths:
      - ".git/"
      - ".gadgets/"
      - ".env"
      - "secrets/"
      - "**/*.pem"
      - "**/*.key"
      - "**/*secret*"
      - "**/*credential*"

audit:
  ledger_path: ".gadgets/ledger/events.jsonl"

evidence:
  root: ".gadgets/runs"

approval:
  require_for_all_writes: true
  # Optional patch approval expiration uses strict UTC RFC3339 without fractional seconds.
  # Example: gadgets approval request-patch <run-id> --expires-at 2999-01-01T00:00:00Z

# Step 17 loads named test commands from this list.
# Keep empty until this local project explicitly opts in to a command.
test_commands: []

# Example shape:
# test_commands:
#   - name: cargo_test
#     command: cargo test
#     working_dir: "."
#     timeout_seconds: 300

git:
  # Remote PR creation is disabled by default. Dry run is enabled by default
  # even after remote_pr.enabled is set to true. To create a GitHub PR, set
  # enabled: true and dry_run: false after review. Gadgets still never pushes
  # branches; the head branch must already exist remotely.
  remote_pr:
    enabled: false
    dry_run: true
    provider: github
    owner: ""
    repo: ""
    api_base: https://api.github.com
    token_env: GITHUB_TOKEN
    default_base_branch: main
    allowed_base_branches:
      - main
    allowed_head_prefixes:
      - feature/
      - fix/
      - docs/
    duplicate_strategy: fail

  protected_branches:
    - main
    - master
    - trunk
    - production
    - prod
    - release/
