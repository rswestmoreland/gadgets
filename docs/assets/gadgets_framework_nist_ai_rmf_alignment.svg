<text class="" x="1126" y="824" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="800" fill="#172033" text-anchor="start"><tspan x="1126" dy="0">MANAGE</tspan></text>
<text class="" x="1126" y="855" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#5b667a" text-anchor="start"><tspan x="1126" dy="0">Risk response, containment, rollback, and improvement</tspan></text>
<circle cx="1088" cy="893" r="5" fill="#b85c00"/>
<text class="" x="1108" y="900" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#172033" text-anchor="start"><tspan x="1108" dy="0">Approval gates, Safe Mode, dry-run-deny,</tspan><tspan x="1108" dy="22.419999999999998">and future hard-deny controls</tspan></text>
<circle cx="1088" cy="951" r="5" fill="#b85c00"/>
<text class="" x="1108" y="958" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#172033" text-anchor="start"><tspan x="1108" dy="0">Pack-load trust decisions, failure</tspan><tspan x="1108" dy="22.419999999999998">behavior, and rollback guidance</tspan></text>
<circle cx="1088" cy="1009" r="5" fill="#b85c00"/>
<text class="" x="1108" y="1016" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#172033" text-anchor="start"><tspan x="1108" dy="0">Future: AI incident events and containment</tspan><tspan x="1108" dy="22.419999999999998">playbooks</tspan></text><rect x="649" y="469" width="520" height="320" rx="42" fill="#101828" opacity="0.09"/><rect x="640" y="458" width="520" height="320" rx="42" fill="#ffffff" stroke="#172033" stroke-width="3"/><g fill="none" stroke="#172033" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M900.0,492 L932,500 V526.0 C931,556 900.0,560 900.0,560 C900.0,560 869,556 868,526.0 V500 Z"/><path d="M900.0,501 V553"/></g><text class="" x="900" y="592" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="800" fill="#172033" text-anchor="middle"><tspan x="900" dy="0">Gadgets Runtime</tspan></text><text class="" x="900" y="638" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="400" fill="#5b667a" text-anchor="middle"><tspan x="900" dy="0">Runtime-enforced authority boundary</tspan></text><text class="" x="900" y="685" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#172033" text-anchor="middle"><tspan x="900" dy="0">Models reason and request.</tspan><tspan x="900" dy="25.0">Gadgets authorize and execute.</tspan><tspan x="900" dy="25.0">Evidence and audit make outcomes</tspan><tspan x="900" dy="25.0">reviewable.</tspan></text><text class="" x="900" y="1135" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#172033" text-anchor="middle"><tspan x="900" dy="0">Interpretation for Gadgets: AI risk management is not a prompt-only problem. It is a runtime control, evidence, audit, policy, and supply-chain problem.</tspan></text><text class="" x="900" y="1170" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#5b667a" text-anchor="middle"><tspan x="900" dy="0">NIST AI RMF is voluntary and use-case agnostic; this map is an engineering alignment, not a compliance claim.</tspan></text></svg>
